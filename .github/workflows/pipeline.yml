name: Bai Tap 7 CI/CD

# QUY ĐỊNH KHI NÀO PIPELINE CHẠY
on:
  # Giải quyết Yêu cầu 2: Chỉ chạy CI trong Merge Request (Pull Request)
  pull_request:
    branches: [ "main" ]
  
  # Giải quyết Yêu cầu 3: Chạy Stage Deploy thủ công khi bấm nút
  workflow_dispatch: 

# ĐỊNH NGHĨA CÁC CÔNG VIỆC (JOBS)
jobs:
  # --- STAGE: Tích hợp liên tục (CI) ---
  build-and-test:
    name: CI Test (Chạy tự động khi có Pull Request)
    if: github.event_name == 'pull_request' 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Chạy Test
        run: echo "Dang chay CI cho Pull Request..."

  # --- STAGE: Triển khai (Deploy) ---
  deploy:
    name: CD Deploy (Chạy thủ công)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Chạy Deploy
        run: echo "Deploy thu cong thanh cong!"