stages:
  - build
  - test
  - deploy

variables:
  GIT_STRATEGY: clone

build_site:
  stage: build
  script:
    - echo "Preparing static site for GitLab Pages..."
    - mkdir -p public/data
    - echo "{\"generated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"commit\":\"${CI_COMMIT_SHA:-local}\",\"branch\":\"${CI_COMMIT_BRANCH:-local}\",\"pipeline\":\"${CI_PIPELINE_ID:-local}\"}" > public/data/build-info.json
    - test -f public/index.html
    - test -f public/styles.css
    - test -f public/js/main.js
  artifacts:
    paths:
      - public/
    expire_in: 1 day

validate_site:
  stage: test
  needs:
    - job: build_site
      artifacts: true
  script:
    - echo "Validating static site files..."
    - grep -q "CI/CD Pipeline Demo" public/index.html
    - grep -q "Pipeline Status" public/index.html
    - test -s public/styles.css
    - test -s public/js/main.js
    - test -f public/data/build-info.json
    - echo "All validation checks passed."

pages:
  stage: deploy
  needs:
    - job: build_site
      artifacts: true
  script:
    - echo "Deploying to GitLab Pages..."
    - echo "Site source directory: public/"
  artifacts:
    paths:
      - public
    expire_in: 1 day
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
